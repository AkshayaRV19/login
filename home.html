<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body class="flex items-center justify-center h-screen bg-violet">

    <div class="w-[500px] p-10 rounded-[30px] text-center
                bg-dark gradient-to-br from-[#06142E] via-[#0B3C5D] to-[#328CC1] backdrop-blur-lg
                border-2 border-cyan-400
                shadow-[0_0_20px_rgba(0,900,900,0.25)]">

        
        <div class="w-24 h-24 mx-auto rounded-full
                    border-[3px] border-cyan-400
                    bg-white/10
                    flex items-center justify-center">

            <i class="bi bi-person-check-fill text-cyan-300 text-5xl"></i>

        </div>

        
        <h1 class="text-4xl font-bold text-gradient-to-br from-[#06142E] via-[#0B3C5D] to-[#328CC1]  mt-6">
            Welcome!
        </h1>

        <p class="text-gradient-to-br from-[#06142E] via-[#0B3C5D] to-[#328CC1]  text-lg mt-4 leading-8">
             Login Successful
            <br>
            Have a great day and enjoy exploring the website.
        </p>

        
        <a href="login.html"
           class="mt-8 inline-flex items-center justify-center gap-2
                  w-full py-3
                  bg-pink-600 hover:bg-blue-700
                  text-white text-lg font-semibold
                  rounded-full transition duration-300">

            <i class="bi bi-box-arrow-right"></i>
            Logout
        </a>

    </div>

</body>
</html>
